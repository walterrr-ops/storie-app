<meta charset="utf-8">

<title>Storie</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#f6f7f5; --surface:#ffffff; --text:#1b1d1a; --muted:#5f6360; --hint:#8a8f8a;
  --border:rgba(0,0,0,0.10); --border-strong:rgba(0,0,0,0.20);
  --accent:#0F6E56; --accent-bg:#E1F5EE; --accent-text:#085041;
  --radius:14px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#14161a; --surface:#1c1f24; --text:#eceeec; --muted:#a8aca8; --hint:#7d827d;
    --border:rgba(255,255,255,0.12); --border-strong:rgba(255,255,255,0.24);
    --accent:#1D9E75; --accent-bg:#0f3b30; --accent-text:#9FE1CB;
  }
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased; line-height:1.5;
  padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 24px);
}
.wrap{max-width:560px; margin:0 auto; padding:18px 16px 0}
header{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px}
h1{font-size:22px; font-weight:600; margin:0; letter-spacing:-0.01em}
.date{font-size:13px; color:var(--hint)}
.seg{display:flex; flex-wrap:wrap; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:4px; gap:4px; margin-bottom:16px}
.seg-btn{flex:1 1 70px; border:none; background:transparent; color:var(--muted); font-size:14px; font-weight:500; padding:10px 8px; border-radius:9px; cursor:pointer; font-family:inherit; white-space:nowrap}
.seg-btn.active{background:var(--accent); color:#fff}
.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px}
.badge{display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:500; padding:5px 12px; border-radius:999px; background:var(--accent-bg); color:var(--accent-text)}
.label{font-size:12px; color:var(--hint); margin:14px 0 4px; text-transform:uppercase; letter-spacing:0.04em}
.idea{font-size:20px; line-height:1.45; margin:0 0 16px}
.btn{appearance:none; -webkit-appearance:none; border:1px solid var(--border-strong); background:var(--surface); color:var(--text);
  font-size:15px; font-weight:500; padding:12px 14px; border-radius:12px; cursor:pointer; font-family:inherit; min-height:46px; display:inline-flex; align-items:center; justify-content:center; gap:8px}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--accent); border-color:var(--accent); color:#fff; width:100%; font-size:16px; margin-bottom:10px}
.btn-primary svg{width:20px; height:20px; flex:none}
.btn-row{display:flex; gap:8px}
.btn-row .btn{flex:1}
.note{font-size:12px; color:var(--hint); margin:12px 0 0; display:flex; align-items:center; gap:6px}
.note svg{width:15px; height:15px; flex:none}
.fhint{margin:14px 0 0; font-size:13px; line-height:1.5; background:var(--accent-bg); color:var(--accent-text); border-radius:10px; padding:10px 12px}
.fhint b{font-weight:600}
.btn-ai{width:100%; margin-top:8px; border-color:var(--accent); color:var(--accent-text)}
.btn-ai svg{width:18px; height:18px; flex:none}
.section{margin-top:22px}
.section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px}
.section-head .label{margin:0}
.count b{font-size:18px; font-weight:600; color:var(--text)}
.count{font-size:13px; color:var(--muted)}
.pills{display:flex; gap:6px}
.pill{flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; gap:5px; padding:11px 0; border-radius:11px;
  border:1px solid var(--border); background:var(--surface); color:var(--muted); font-size:12px; font-weight:500; cursor:pointer; font-family:inherit}
.pill.done{background:var(--accent-bg); border-color:var(--accent); color:var(--accent-text)}
.pill.today{box-shadow:0 0 0 2px var(--accent)}
.pill svg{width:16px; height:16px}
.msg{font-size:13px; color:var(--muted); margin:12px 0 0}
.row{display:flex; align-items:center; gap:12px; padding:12px 14px; border:1px solid var(--border); border-radius:12px; background:var(--surface); margin-bottom:8px}
.row .day{font-size:13px; font-weight:600; color:var(--muted); width:34px; flex:none}
.row .what{font-size:14px}
.add{display:flex; gap:8px; margin-bottom:8px}
.add input{flex:1; font-family:inherit; font-size:15px; padding:12px 14px; border-radius:12px; border:1px solid var(--border-strong); background:var(--surface); color:var(--text); min-height:46px}
.add input:focus{outline:none; border-color:var(--accent)}
.idea-row{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:12px 14px; border:1px solid var(--border); border-radius:12px; background:var(--surface); margin-bottom:8px}
.idea-row span{font-size:14px}
.icon-btn{appearance:none; border:none; background:transparent; color:var(--hint); cursor:pointer; padding:6px; display:inline-flex}
.icon-btn svg{width:20px; height:20px}
.empty{font-size:13px; color:var(--hint); margin:6px 0 0}
footer{max-width:560px; margin:24px auto 0; padding:0 16px; font-size:12px; color:var(--hint); text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Storie</h1>
    <span class="date" id="date"></span>
  </header>

  <div class="seg">
    <button class="seg-btn active" data-mode="storie">Storie</button>
    <button class="seg-btn" data-mode="yt">Post YT</button>
    <button class="seg-btn" data-mode="short">Short</button>
    <button class="seg-btn" data-mode="long">Long</button>
  </div>

  <div class="card">
    <span class="badge"><span id="rubrica"></span></span>
    <p class="label" id="idea-label">Storia di oggi</p>
    <p class="idea" id="idea"></p>
    <button class="btn btn-primary" id="primary"></button>
    <div class="btn-row">
      <button class="btn" id="done">Fatto</button>
      <button class="btn" id="shuffle">Altra idea</button>
      <button class="btn" id="copy">Copia</button>
    </div>
    <button class="btn btn-ai" id="ai"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z"/></svg><span>Prompt per Claude / Gemini</span></button>
    <p class="note" id="note"></p>
    <div class="fhint" id="format-hint"></div>
  </div>

  <div class="section">
    <div class="section-head">
      <p class="label">La tua costanza</p>
      <span class="count"><b id="count">0</b> questa settimana</span>
    </div>
    <div class="pills" id="pills"></div>
    <p class="msg" id="msg"></p>
  </div>

  <div class="section">
    <p class="label" id="palin-label">Palinsesto della settimana</p>
    <div id="palin"></div>
  </div>

  <div class="section">
    <p class="label">Idee in cassetto</p>
    <div class="add">
      <input id="bk-input" type="text" placeholder="Un'idea che ti viene ora..." />
      <button class="btn" id="bk-add">Aggiungi</button>
    </div>
    <div id="bk-list"></div>
  </div>
</div>
<footer id="footer">I dati restano sul tuo telefono. Funziona anche offline.</footer>

    if(n<=2)return "Bel ritmo, continua.";

  }
  function micLong(n){
    if(n===0)return "Obiettivo: 1 video lungo a settimana.";
    if(n===1)return "Video lungo fatto. Grande.";
    return "Più di uno: che produttività.";
  }

  var MODES={
    storie:{ideas:IDEAS_STORIE,palin:PALIN_STORIE,ideaLabel:"Storia di oggi",palinLabel:"Palinsesto della settimana",
      primTxt:"Apri Instagram e registra",primIcon:IC.camera,primAction:"instagram://story-camera",
      note:"1 take, niente rifacimenti",noteIcon:IC.mic,micro:micStorie,weekKey:"storie_week",dailyKey:"storie_daily"},
    yt:{ideas:IDEAS_YT,palin:PALIN_YT,ideaLabel:"Spunto per il prossimo post",palinLabel:"Quando pubblicare",
      primTxt:"Apri YouTube",primIcon:IC.play,primAction:"https://www.youtube.com",
      note:"Scrivi come parli: breve, diretto, una sola idea",noteIcon:IC.pen,micro:micYt,weekKey:"yt_week",dailyKey:"yt_daily"},
    short:{ideas:IDEAS_SHORT,palin:PALIN_SHORT,ideaLabel:"Argomento per uno Short",palinLabel:"Ritmo consigliato",
      primTxt:"Copia l'argomento",primIcon:IC.copy,primAction:"COPY",
      note:"Hook nei primi 2 secondi, una sola idea",noteIcon:IC.play,micro:micShort,weekKey:"short_week",dailyKey:"short_daily"},
    long:{ideas:IDEAS_LONG,palin:PALIN_LONG,ideaLabel:"Argomento per un video lungo",palinLabel:"Ritmo consigliato",
      primTxt:"Copia l'argomento",primIcon:IC.copy,primAction:"COPY",
      note:"Un argomento, tanta sostanza, fonti solide",noteIcon:IC.pen,micro:micLong,weekKey:"long_week",dailyKey:"long_daily"}
  };

  function get(k,d){try{var v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return d;}}
  function set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
  function todayKey(){var d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
  function weekKey(){var d=new Date();var t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));var dn=(t.getUTCDay()+6)%7;t.setUTCDate(t.getUTCDate()-dn+3);var f=new Date(Date.UTC(t.getUTCFullYear(),0,4));var w=1+Math.round(((t-f)/86400000-3+((f.getUTCDay()+6)%7))/7);return t.getUTCFullYear()+"-W"+w;}
  function hashKey(s){var h=0;for(var i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;}return h;}

  var DAYS=["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
  var MESI=["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
  var todayIdx=(new Date().getDay()+6)%7;
  var nowD=new Date();
  document.getElementById("date").textContent=nowD.getDate()+" "+MESI[nowD.getMonth()];

  var backlog=get("storie_backlog",["Differenza tra fame vera e fame nervosa","Cosa tengo sempre nel frigo"]);
  var mode, cfg, current, wkObj;

  function poolForToday(){
    var rubs=null;
    for(var i=0;i<cfg.palin.length;i++){ if(cfg.palin[i][0]===DAYS[todayIdx]){ rubs=cfg.palin[i][2]||null; break; } }
    if(rubs&&rubs.length){
      var f=cfg.ideas.filter(function(x){return rubs.indexOf(x.r)>=0;});
      if(f.length) return f;
    }
    return cfg.ideas;
  }
  function loadDaily(){
    var pool=poolForToday();
    var d=get(cfg.dailyKey,null);
    if(d&&d.date===todayKey()&&d.t){current={r:d.r,t:d.t};return;}
    var idx=hashKey(todayKey()+cfg.ideaLabel)%pool.length;
    current=pool[idx];
    set(cfg.dailyKey,{date:todayKey(),r:current.r,t:current.t});
  }
  function loadWeek(){
    var w=get(cfg.weekKey,null);
    if(!w||w.week!==weekKey()){w={week:weekKey(),days:[false,false,false,false,false,false,false]};set(cfg.weekKey,w);}
    wkObj=w;
  }
  var LEAN={"Pensiero del giorno":"parlata","Dietro il camice":"parlata","Vita vera":"parlata","Chiedimi qualsiasi cosa":"parlata","Vero o falso?":"scritta","Cosa mangio davvero":"neutra","Backstage allenamento":"neutra"};
  function inWorkWindow(){var d=new Date();var wd=(d.getDay()+6)%7;if(wd>4)return false;var t=d.getHours()*60+d.getMinutes();return (t>=540&&t<720)||(t>=840&&t<1020);}
  function suggerimentoFormato(rub){
    var lean=LEAN[rub]||"neutra";
    if(inWorkWindow()){
      if(lean==="parlata")return {tipo:"parlata + sottotitoli",motivo:"Vive della tua voce, ma a quest'ora molti sono al lavoro: parlala e aggiungi i sottotitoli, così rende anche in muto."};
      return {tipo:"scritta (testo a schermo)",motivo:"Orario d'ufficio: molti guardano senza audio. Meglio testo, sondaggio o video con scritte."};
    }
    if(lean==="scritta")return {tipo:"scritta o interattiva",motivo:"Argomento da sondaggio o quiz: qui l'interattivo funziona di più."};
    return {tipo:"parlata",motivo:"A quest'ora si può ascoltare: usa la tua voce, è più autentica e crea legame."};
  }
  function buildAIPrompt(){
    var pre="Sei l'assistente copywriter di Walter Antonucci, biologo nutrizionista e personal trainer (oltre 230k follower). Tono: caldo e diretto, da amico esperto, scientifico ma semplice. Regole ferree: non demonizzare nessun cibo (educa a completare e alternare, mai a 'evitare'); niente marchi commerciali (usa categorie generiche); guarda al quadro d'insieme, non al singolo alimento; prendi posizione contro i guru e il diet talk, mai contro il cibo o contro chi lo mangia.\n\n";
    var idea=current.t; var task;
    if(mode==="storie"){
      var tipo=suggerimentoFormato(current.r).tipo;
      if(tipo.indexOf("scritta")===0){
        task="Scrivimi una Instagram Story SCRITTA (testo a schermo, pensata per essere guardata senza audio) su questo spunto: «"+idea+"». Dammi 3 frame: 1) frame-gancio con una frase forte; 2) frame centrale con il messaggio chiave in poche parole; 3) frame finale con una CTA. Testo breve, leggibile in pochi secondi.";
      } else if(tipo.indexOf("parlata + sottotitoli")===0){
        task="Scrivimi una Instagram Story PARLATA (un solo take, 30-45 secondi) su questo spunto: «"+idea+"». Dammi: la frase-gancio dei primi 2 secondi, cosa dire in 3 blocchi brevi, una CTA finale; in più i SOTTOTITOLI frase per frase, perché molti la guarderanno in muto.";
      } else {
        task="Scrivimi una Instagram Story PARLATA (un solo take, 30-45 secondi) su questo spunto: «"+idea+"». Dammi: la frase-gancio dei primi 2 secondi, cosa dire in 3 blocchi brevi, una CTA finale leggera. Linguaggio parlato e naturale, come se parlassi a una persona sola.";
      }
    } else if(mode==="yt"){
      task="Scrivimi un post scritto per la community di YouTube su questo spunto: «"+idea+"». Massimo 4-5 righe, tono diretto, chiudi con una domanda che inviti al commento. Se è un sondaggio, proponi 3-4 opzioni di voto.";
    } else if(mode==="short"){
      task="Scrivimi lo script di un Reel/Short di 60-90 secondi su questo argomento: «"+idea+"». Struttura: hook fortissimo nei primi 2 secondi, corpo educativo chiaro, chiusura che richiama l'hook con una CTA. Dammi anche 2 alternative di hook.";
    } else {
      task="Fammi la scaletta e i punti chiave di un video YouTube di 8-15 minuti su questo argomento: «"+idea+"». Dammi: un titolo onesto ma accattivante, l'hook iniziale, 4-6 sezioni con i concetti da spiegare, una chiusura con CTA, e segnala dove servono fonti scientifiche.";
    }
    return pre+task+"\n\nMantieni sempre il tono e le regole indicate sopra.";
  }
  function renderFormatHint(){
    var el=document.getElementById("format-hint");if(!el)return;
    if(mode!=="storie"){el.style.display="none";return;}
    el.style.display="";
    var s=suggerimentoFormato(current.r);
    el.innerHTML='<b>Meglio '+s.tipo+'</b><br>'+s.motivo;
  }
  function renderIdea(){
    document.getElementById("idea").textContent=current.t;
    document.getElementById("rubrica").textContent=current.r;
    renderFormatHint();
  }
  function renderStreak(){
    var n=wkObj.days.filter(Boolean).length;
    document.getElementById("count").textContent=n;
    document.getElementById("msg").textContent=cfg.micro(n);
    var box=document.getElementById("pills");box.innerHTML="";
    DAYS.forEach(function(d,i){
      var b=document.createElement("button");
      b.className="pill"+(wkObj.days[i]?" done":"")+(i===todayIdx?" today":"");
      b.setAttribute("aria-pressed",wkObj.days[i]?"true":"false");
      b.innerHTML="<span>"+d+"</span>"+(wkObj.days[i]?ICON_CHECK:ICON_DOT);
      b.addEventListener("click",function(){wkObj.days[i]=!wkObj.days[i];set(cfg.weekKey,wkObj);renderStreak();});
      box.appendChild(b);
    });
  }
  function renderPalin(){
    document.getElementById("palin-label").textContent=cfg.palinLabel;
    var box=document.getElementById("palin");box.innerHTML="";
    cfg.palin.forEach(function(p){
      var r=document.createElement("div");r.className="row";
      r.innerHTML='<span class="day">'+p[0]+'</span><span class="what">'+p[1]+'</span>';
      box.appendChild(r);
    });
  }
  function renderBacklog(){
    var box=document.getElementById("bk-list");box.innerHTML="";
    if(backlog.length===0){box.innerHTML='<p class="empty">Nessuna idea in cassetto. Aggiungine una quando ti viene.</p>';return;}
    backlog.forEach(function(t,i){
      var r=document.createElement("div");r.className="idea-row";
      var s=document.createElement("span");s.textContent=t;
      var del=document.createElement("button");del.className="icon-btn";del.setAttribute("aria-label","Elimina idea");del.innerHTML=ICON_TRASH;
      del.addEventListener("click",function(){backlog.splice(i,1);set("storie_backlog",backlog);renderBacklog();});
      r.appendChild(s);r.appendChild(del);box.appendChild(r);
    });
  }
  function flash(btn,txt){var o=btn.textContent;btn.textContent=txt;setTimeout(function(){btn.textContent=o;},1200);}
  function flashHtml(btn,html){var o=btn.innerHTML;btn.innerHTML=html;setTimeout(function(){btn.innerHTML=o;},1200);}

  function applyMode(m){
    mode=m;cfg=MODES[m];set("storie_mode",m);
    var btns=document.querySelectorAll(".seg-btn");
    for(var i=0;i<btns.length;i++){btns[i].classList.toggle("active",btns[i].getAttribute("data-mode")===m);}
    document.getElementById("idea-label").textContent=cfg.ideaLabel;
    document.getElementById("primary").innerHTML=cfg.primIcon+"<span>"+cfg.primTxt+"</span>";
    document.getElementById("note").innerHTML=cfg.noteIcon+"<span>"+cfg.note+"</span>";
    loadDaily();renderIdea();renderPalin();loadWeek();renderStreak();
  }

  var segBtns=document.querySelectorAll(".seg-btn");
  for(var i=0;i<segBtns.length;i++){segBtns[i].addEventListener("click",function(){applyMode(this.getAttribute("data-mode"));});}
  document.getElementById("primary").addEventListener("click",function(e){
    if(cfg.primAction==="COPY"){
      var b=e.currentTarget;var ok=function(){flashHtml(b,cfg.primIcon+"<span>Copiato!</span>");};
      if(navigator.clipboard){navigator.clipboard.writeText(current.t).then(ok).catch(ok);}else{ok();}
    }else{window.location.href=cfg.primAction;}
  });
  document.getElementById("done").addEventListener("click",function(e){wkObj.days[todayIdx]=true;set(cfg.weekKey,wkObj);renderStreak();flash(e.currentTarget,"Bravo!");});
  document.getElementById("shuffle").addEventListener("click",function(){var pool=poolForToday();var pick=pool[0];if(pool.length>1){var prev=current?current.t:null;var guard=0;do{pick=pool[Math.floor(Math.random()*pool.length)];}while(pick.t===prev&&++guard<20);}current=pick;set(cfg.dailyKey,{date:todayKey(),r:current.r,t:current.t});renderIdea();});
  document.getElementById("copy").addEventListener("click",function(e){var b=e.currentTarget;if(navigator.clipboard){navigator.clipboard.writeText(current.t).then(function(){flash(b,"Copiato!");});}else{flash(b,"Copiato!");}});
  document.getElementById("ai").addEventListener("click",function(e){var b=e.currentTarget;var txt=buildAIPrompt();function ok(){flashHtml(b,"<span>Prompt copiato! Incollalo su Claude o Gemini</span>");}if(navigator.clipboard){navigator.clipboard.writeText(txt).then(ok).catch(ok);}else{ok();}});
  document.getElementById("bk-add").addEventListener("click",addIdea);
  document.getElementById("bk-input").addEventListener("keydown",function(e){if(e.key==="Enter")addIdea();});
  function addIdea(){var inp=document.getElementById("bk-input");var v=(inp.value||"").trim();if(!v)return;backlog.push(v);set("storie_backlog",backlog);inp.value="";renderBacklog();}

  applyMode(get("storie_mode","storie"));
  renderBacklog();

  var META={versione:"v10",aggiornato:"21 giugno 2026",crediti:23438,fonti:"commenti IG+YT, Reddit, Google Trends"};
  var ft=document.getElementById("footer");
  if(ft){ft.innerHTML="Versione "+META.versione+" · idee aggiornate il "+META.aggiornato+"<br>"+META.crediti.toLocaleString("it-IT")+" crediti ScrapeCreators rimasti<br>Fonti: "+META.fonti+"<br>I dati restano sul tuo telefono. Funziona anche offline.";}

  if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}
})();
</script>
</body>
</html>
